<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: var(--primary);
        }

        img{
            height: 300px;
            width: 250px;
            margin-top: 10px;
        }

        .productdivs{
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        h2{
            margin-top: 40px;
        }

        #cart{
            margin-left: 20px; 
        }

        hr{
            width: 320px;
        }

        button{
            width: 150px;
            height: 50px;
            background: black;
            color: white;
            margin-top: 15px;
            border-radius: 25px;
            font-size: 16px;
            transition: 0.25s;
            margin-top: 15px;
            margin-right: 15px;
        }

        button:hover{
            color: black;
            background-color: white;
        }

        #empty{
            font-size: 25px;
        }

        #message{
            background-color: rgb(133, 148, 148);
            padding: 20px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
            text-align: center;
        }

        .productdivs2{
            display: flex;
            flex-direction: row;
            gap: 15px;
        }

        #purchased{
            font-size: 25px;
            margin-bottom: 15px;
        }

        #exit{
            position: absolute;
            top: 0;
            right: 0;
            background: transparent;
            border: 0;
            color: black;
            transition: 0.25s;
        }

        #exit:hover{
            font-size: 25px;
        }

        .insideproduct{
            display: flex;
            flex-direction: column;
            height: 100px;
            justify-content: space-between;
        }

        #messagediv{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
        }

        .messageimg{
            height: 150px;
            width: 125px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 10%;
            background: white;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
            margin-bottom: 20px;
        }

        #cartb{
            height: 40px;
            width: 120px;
            border-radius: 30px;
            font-size: 16px;
            background-color: #222222;
            color: white;
            transition: 0.25s;
        }

        #cartb:hover{
            color: #222222;
            background-color: white;
        }

        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -1px; }
    </style>
</head>
<body>
    
    <a href="../products/products.html"><button id="cartb" target="blank">Products page</button></a>
    <h1>Your Cart:</h1>
    <div id="cart"></div>


    <script src="./cart.js" type="module"></script>
</body>
</html>
