<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=Big+Shoulders:opsz,wght@10..72,100..900&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Federant&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Karla:ital,wght@0,200..800;1,200..800&family=Lexend+Deca:wght@100..900&family=Outfit:wght@100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Public+Sans:ital,wght@0,100..900;1,100..900&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&family=Young+Serif&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Frontend Mentor | Contact form</title>
  </head>
  <body>
    <div id="container">
      <div id="main">
        <h1 id="contact">Contact Us</h1>
        <form>
          <div id="fullname">
            <div id="nameinp">
              <label for="name">First Name *</label>
              <input type="text" name="name" id="name" required />

            </div>
            <div id="lastnameinp">
              <label for="lastname">Last Name *</label>
              <input type="text" name="lastname" id="lastname" required />

            </div>
          </div>
          <div id="emailinp">
            <label for="email">Email Address *</label>
            <input type="email" name="email" id="email" required />
          </div>
          <div id="query-type">
            <label>Query Type *</label>
            <div class="radio-group">
              <label class="radio-card">
                <input type="radio" name="query" required/>
                <span class="custom-radio"></span>
                <span class="radio-text">General Enquiry</span>
              </label>
              <label class="radio-card">
                <input type="radio" name="query" required/>
                <span class="custom-radio"></span>
                <span class="radio-text">Support Request</span>
              </label>
            </div>
          </div>
          <div id="messageinp">
            <label for="">Message *</label>
            <input type="text" name="message" id="message" required>
          </div>
          <div id="consent">
            <input type="checkbox" name="check" id="check" required>
            <label for="check">I consent to being contacted by the team *</label>
          </div>
          <button id="submit">Submit</button>
        </form>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
